version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_saas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Strongest@
      MYSQL_DATABASE: saas_db
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: Strongest@
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: